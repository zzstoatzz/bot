default_max_lines = 500
respect_gitignore = true

exclude = [
    ".git/**",
    ".eggs/**",
    "sandbox/**",
]

[[rules]]
path = "**/*.lock"
max_lines = 10000

[[rules]]
path = "src/bot/agent.py"
max_lines = 1061

[[rules]]
path = "src/bot/memory/namespace_memory.py"
max_lines = 1035

[[rules]]
path = "src/bot/main.py"
max_lines = 851

[[rules]]
path = "web/src/lib/components/MindMap.svelte"
max_lines = 600

[[rules]]
path = "web/src/lib/components/Logbook.svelte"
max_lines = 650

[[rules]]
path = "web/src/routes/capabilities/+page.svelte"
max_lines = 700
