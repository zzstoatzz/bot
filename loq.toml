default_max_lines = 500
respect_gitignore = true

exclude = [
    ".git/**",
    ".eggs/**",
    "sandbox/**",
]

[[rules]]
path = "**/*.lock"
max_lines = 10000

[[rules]]
path = "src/bot/agent.py"
max_lines = 1007

[[rules]]
path = "src/bot/memory/namespace_memory.py"
max_lines = 872

[[rules]]
path = "src/bot/main.py"
max_lines = 811
